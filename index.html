<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#111111">


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>那古野サルーン キッチンマニュアル</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Hiragino Sans",sans-serif;
  background:linear-gradient(to bottom,#fff8f0,#ffe0c7);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ヘッダー */
header{
  background:#5c3d2e;
  color:white;
  text-align:center;
  padding:22px;
  font-size:20px;
  font-weight:bold;
  letter-spacing:2px;
}

/* メイン中央 */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  padding:40px 20px;
}

.content{
  width:100%;
  max-width:520px;
}

/* お通しカード */
.details-card{
  background:white;
  padding:20px;
  border-radius:20px;
  margin-bottom:30px;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.details-card summary{
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
}

.details-card ol{
  margin-top:15px;
  padding-left:20px;
  line-height:1.9;
}

/* カテゴリー */
.category{
  background: #fff;
  border-radius: 20px;
  text-align: center;
  padding: 20px 10px;
  font-size: 18px;
  text-decoration: none;
  color: black;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.category br {
  margin-bottom: 5px;
}
.category-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* ← 2列 */
  gap: 15px;
  padding: 15px;
}

.category:hover{
  background:#f7efe6;
}

.category:active{
  transform:scale(0.97);
}

/* 区切り線 */
.divider{
  margin:60px 0 30px 0;
  border:none;
  border-top:1px solid #e0c9b3;
}

/* セクションタイトル */
.section-title{
  margin-bottom:20px;
  font-size:16px;
  color:#5c3d2e;
  text-align:center;
}

/* フォーム */
form{
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

textarea{
  height:140px;
}

button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:#b48a5a;
  color:white;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#a07444;
}

button:active{
  transform:scale(0.97);
}

/* フッター */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#777;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.3);
  border-top:4px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.menu-photo {
    width: 100%;
    max-width: 400px;
    margin: 15px 0;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* 検索バー */
#search {
  width: 92%;
  margin: 15px auto;
  display: block;
  padding: 16px;
  font-size: 18px;
  border-radius: 15px;
  border: none;
}

/* 検索結果 */
.result-item {
  background: white;
  margin: 8px;
  padding: 12px;
  border-radius: 10px;
}
#searchResults {
  margin: 10px;
}

.result-item {
  background: white;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 10px;
}
.notice {
  background: #fff8f0;
  border-left: 4px solid #ff9800;
  padding: 12px 14px;
  margin: 12px 15px;
  font-size: 16px; /* ←ここ上げる */
  border-radius: 10px;
  color: #333;
  line-height: 1.6; /* ←読みやすく */
}
</style>
</head>

<body>

<script>

  { name: "レタス", amount: "２名以上でのシェアおすすめ", category: "🍢 おでん", link: "oden.html", keywords: ["れたす"] },
  { name: "ブロッコリー", amount: "２名以上でのシェアおすすめ", category: "🍢 おでん", link: "oden.html", keywords: ["ぶろっこりー"] },
  { name: "京水菜", amount: "２名以上でのシェアおすすめ", category: "🍢 おでん", link: "oden.html", keywords: ["きょうみずな"] },
  { name: "刺身わかめ", amount: "２名以上でのシェアおすすめ", category: "🍢 おでん", link: "oden.html", keywords: ["さしみ"] },

  { name: "餃子", amount: "４個", category: "🍢 おでん", link: "oden.html", keywords: ["ぎょうざ"] },

const search = document.getElementById("search");
const results = document.getElementById("searchResults");
const categoryList = document.getElementById("categoryList");

// 🔍 検索処理
search.addEventListener("input", () => {
  const value = search.value.trim();

  // 何も入力されてない時
  if (value === "") {
    results.innerHTML = "";
    categoryList.style.display = "block";
    return;
  }

  // カテゴリ隠す
  categoryList.style.display = "none";

  // 検索
  const filtered = menu.filter(item =>
    item.name.includes(value)
  );

  results.innerHTML = "";

  if (filtered.length === 0) {
    results.innerHTML = "<p style='padding:10px;'>該当なし</p>";
    return;
  }

  filtered.forEach(item => {
    results.innerHTML += `
      <div class="result-item">
        <strong>${item.name}</strong><br>
        個数：${item.amount}<br>
        <small>${item.category}</small><br>
        <a href="${item.link}">詳細へ</a>
      </div>
    `;
  });
});
const categoryGrid = document.querySelector(".category-grid");

search.addEventListener("input", () => {
  const value = search.value.trim();

  if (value === "") {
    results.innerHTML = "";
    categoryGrid.style.display = "grid";
    return;
  }


  const filtered = menu.filter(item =>
    item.name.includes(value) ||
    (item.keywords && item.keywords.some(k => k.includes(value)))
  );

  results.innerHTML = "";

  if (filtered.length === 0) {
    results.innerHTML = "<p style='padding:10px;'>該当なし</p>";
    return;
  }

  filtered.forEach(item => {
    results.innerHTML += `
      <div class="result-item">
        <strong>${item.name}</strong><br>
        個数：${item.amount}<br>
        <small>${item.category}</small><br>
        <a href="${item.link}?item=${encodeURIComponent(item.name)}">見る</a>
      </div>
    `;
  });
});
</script>

<div id="update-notice" style="
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:white;
padding:10px 20px;
border-radius:30px;
display:none;
z-index:9999;
cursor:pointer;">
🔄 新しい更新があります。タップして更新
</div>

<script>
let newWorker;

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(reg => {

      reg.addEventListener("updatefound", () => {
        newWorker = reg.installing;

        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            document.getElementById("update-notice").style.display = "block";
          }
        });
      });
    });

  document.getElementById("update-notice").addEventListener("click", () => {
    location.reload();
  });
}
</script>
<script>
document.getElementById("app-header").addEventListener("click", async () => {

  const overlay = document.getElementById("loading-overlay");
  overlay.style.display = "flex";

  try {
    // キャッシュ全削除
    const keys = await caches.keys();
    await Promise.all(keys.map(key => caches.delete(key)));

    // SW更新要求
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: "SKIP_WAITING" });
    }

    // 少し待ってから強制リロード
    setTimeout(() => {
      window.location.reload(true);
    }, 800);

  } catch (error) {
    console.log("更新失敗", error);
    overlay.style.display = "none";
  }
});
</script>
