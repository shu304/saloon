<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デザートマニュアル</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"onclick="reloadWithOverlay()">
    那古野サルーン<br>
    🍰 デザートマニュアル
</div>

<div class="sub-nav">
    <a href="index.html" class="button small">← トップへ戻る</a>
</div>

<div class="container">


    <summary>わらび餅(５個)</summary>

    <summary>バナナトロン(４切れ)</summary>
        <li>春巻きの皮にバナナとあんこを入れて揚げたデザート</li>


<div class="link-grid">
    <a class="category" href="oden.html">🍢<br> おでん</a>
    <a class="category" href="yaki.html">🔥<br> 焼き</a>
    <a class="category" href="age.html">🍤<br> 揚げ</a>
</div>


<a href="index.html" class="button">← トップに戻る</a>

</div>
<footer>
© Nagono Saloon Manual
</footer>
<!-- 更新中オーバーレイ -->
<div id="loading-overlay">
  <div style="margin-bottom:15px;">🔄 最新データを取得中...</div>
  <div class="spinner"></div>
</div>

<script>
// 🔍 URLから商品名を取得
const params = new URLSearchParams(window.location.search);
const target = params.get("item");

if (target) {
  const detailsList = document.querySelectorAll("details");

  detailsList.forEach(detail => {
    const summaryText = detail.querySelector("summary").textContent;

    if (summaryText.includes(target)) {
      // 開く
      detail.open = true;

      // スクロール
      detail.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });

      // 他を消したい場合はこれ👇（任意）
      // detail.style.display = "block";
    } else {
      // 他を消す場合（ONにしたいならコメント外す）
      // detail.style.display = "none";
    }
  });
}

function reloadWithOverlay() {
    const overlay = document.getElementById("loading-overlay");
    overlay.style.display = "flex";

    setTimeout(() => {
        location.reload();
    }, 800); // 0.8秒後に更新
}
</script>
</body>
</html>
